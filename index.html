<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandTrack — AI Gesture Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00f5ff;
      --violet: #a855f7;
      --pink:   #f472b6;
      --bg:     #04040c;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --text:    rgba(255,255,255,0.85);
      --muted:   rgba(255,255,255,0.35);
      --nav-h-desk: 64px;
      --nav-h-mob:  56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ─── Ambient background glow ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(0,245,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 45% at 80% 100%, rgba(168,85,247,0.09) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ══════════════════ NAVBAR ══════════════════ */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h-desk);
      z-index: 100;
      display: flex; align-items: center;
      padding: 0 24px;
      background: rgba(4,4,12,0.7);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border-bottom: 1px solid var(--border);
    }

    /* Logo */
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 0 18px rgba(0,245,255,0.3);
    }
    .nav-logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 17px;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff 40%, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-logo-badge {
      font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--cyan);
      background: rgba(0,245,255,0.1); border: 1px solid rgba(0,245,255,0.2);
      padding: 2px 6px; border-radius: 4px;
    }

    /* Nav center — status pills */
    .nav-status {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; margin-right: auto;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .status-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-pill.live .dot { background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 1.5s infinite; }
    .status-pill.live { color: rgba(255,255,255,0.7); border-color: rgba(74,222,128,0.2); }

    /* Nav right — controls */
    .nav-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); }
    .btn.primary {
      background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(168,85,247,0.15));
      border-color: rgba(0,245,255,0.3);
      color: var(--cyan);
    }
    .btn.primary:hover { background: linear-gradient(135deg, rgba(0,245,255,0.25), rgba(168,85,247,0.25)); box-shadow: 0 0 20px rgba(0,245,255,0.15); }
    .btn.danger  { border-color: rgba(248,113,113,0.3); color: #f87171; }
    .btn.danger:hover  { background: rgba(248,113,113,0.1); }
    .btn.off { border-color: rgba(248,113,113,0.25); color: rgba(248,113,113,0.6); background: rgba(248,113,113,0.05); }

    /* ══════════════════ MAIN LAYOUT ══════════════════ */
    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      height: 100svh;
      padding-top: var(--nav-h-desk);
      gap: 0;
    }

    /* ─── Canvas area ─── */
    #stage {
      flex: 1 1 0;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 16px 20px 8px;
      min-height: 0;
    }

    #canvas-wrap {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 0 60px rgba(0,245,255,0.06),
        0 30px 80px rgba(0,0,0,0.6);
      width: min(1280px, 100%);
      max-height: 100%;
      aspect-ratio: 4 / 3;
    }

    #canvas-wrap canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; display: block;
    }
    #draw-canvas { z-index: 4; pointer-events: none; }
    #cam-canvas  { z-index: 3; pointer-events: none; }
    video { display: none; }

    /* Overlay badges inside canvas */
    #mode-indicator {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
    }
    .badge.pen    { background: rgba(168,85,247,0.2);  color: #c084fc; border-color: rgba(168,85,247,0.3); }
    .badge.eraser { background: rgba(248,113,113,0.2); color: #f87171; border-color: rgba(248,113,113,0.3); }

    /* Canvas corner gradient frame */
    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
      border-radius: 18px;
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(0,245,255,0.12), transparent 40%, transparent 60%, rgba(168,85,247,0.12)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
    }

    /* ─── HUD bar ─── */
    #hud {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 0;
      background: rgba(8,8,20,0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 8px 20px 16px;
      padding: 0 4px;
      overflow: hidden;
    }

    .hud-cell {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      position: relative;
    }
    .hud-cell + .hud-cell::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 1px; background: var(--border);
    }

    .hud-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .hud-value { font-size: 16px; font-weight: 600; color: #fff; font-family: 'Space Grotesk', sans-serif; }
    .hud-value.gesture { font-size: 18px; min-width: 120px; text-align: center; }
    .hud-value.fps { color: #4ade80; font-size: 14px; font-variant-numeric: tabular-nums; }
    .hud-value.hands { color: var(--cyan); font-size: 14px; }

    /* ══════════════════ STATUS SCREEN ══════════════════ */
    #status-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      background: var(--bg);
    }
    .loader-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: var(--cyan);
      animation: spin 0.9s linear infinite;
    }
    .status-msg {
      font-size: 14px; font-weight: 500; color: var(--muted);
      letter-spacing: 0.06em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════ RESPONSIVE ══════════════════ */

    /* Tablet */
    @media (max-width: 768px) {
      :root { --nav-h-desk: var(--nav-h-mob); }

      #navbar { padding: 0 14px; gap: 8px; }
      .nav-logo-badge { display: none; }
      .nav-status { display: none; }  /* hide status pills on mobile */
      .nav-controls { margin-left: auto; }

      .btn { padding: 6px 12px; font-size: 12px; gap: 4px; }
      .btn .btn-label { display: none; } /* hide text, show icon only */

      #stage { padding: 10px 12px 6px; }

      #hud { margin: 6px 12px 12px; }
      .hud-cell { padding: 10px 14px; }
      .hud-value.gesture { font-size: 15px; min-width: 90px; }
      .hud-value { font-size: 13px; }
      .hud-label { font-size: 9px; }
    }

    /* Small phones */
    @media (max-width: 420px) {
      .hud-cell:last-child { display: none; } /* hide FPS on tiny screens */
      .hud-cell { padding: 9px 10px; }
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .loader-ring { animation: none; border-top-color: var(--cyan); }
      .dot { animation: none !important; }
    }
  </style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav id="navbar">
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">🖐</div>
    <span class="nav-logo-text">HandTrack</span>
    <span class="nav-logo-badge">Beta</span>
  </a>

  <div class="nav-status">
    <div class="status-pill" id="nav-model-pill">
      <span class="dot"></span>
      <span>MediaPipe</span>
    </div>
    <div class="status-pill" id="nav-cam-pill">
      <span class="dot"></span>
      <span>กล้อง</span>
    </div>
  </div>

  <div class="nav-controls">
    <button class="btn primary" id="toggle-draw">
      <span>🎨</span>
      <span class="btn-label">วาด: เปิด</span>
    </button>
    <button class="btn danger" id="clear-draw">
      <span>🗑</span>
      <span class="btn-label">ล้าง</span>
    </button>
  </div>
</nav>

<!-- ══ MAIN ══ -->
<div id="app">
  <div id="stage">
    <div id="canvas-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="draw-canvas"></canvas>
      <canvas id="cam-canvas"></canvas>
      <div id="mode-indicator">
        <div class="badge pen">✏️ มือขวา = ปากกา</div>
        <div class="badge eraser">⬜ มือซ้าย = ยางลบ</div>
      </div>
    </div>
  </div>

  <div id="hud">
    <div class="hud-cell">
      <div>
        <div class="hud-label">Gesture</div>
        <div class="hud-value gesture" id="gesture">ยกมือขึ้น</div>
      </div>
    </div>
    <div class="hud-cell">
      <div>
        <div class="hud-label">Hands</div>
        <div class="hud-value hands" id="hand-count">0 มือ</div>
      </div>
    </div>
    <div class="hud-cell">
      <div>
        <div class="hud-label">FPS</div>
        <div class="hud-value fps" id="fps">—</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ STATUS SCREEN ══ -->
<div id="status-screen">
  <div class="loader-ring"></div>
  <div class="status-msg" id="status">กำลังโหลด...</div>
</div>

<script type="module">
  import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
  ];
  const FINGER_TIPS  = [4, 8, 12, 16, 20];
  const FINGER_BASES = [2, 6, 10, 14, 18];

  const video      = document.getElementById("video");
  const camCanvas  = document.getElementById("cam-canvas");
  const drawCanvas = document.getElementById("draw-canvas");
  const camCtx     = camCanvas.getContext("2d");
  const drawCtx    = drawCanvas.getContext("2d");
  const gestureEl  = document.getElementById("gesture");
  const handCountEl= document.getElementById("hand-count");
  const fpsEl      = document.getElementById("fps");
  const statusEl   = document.getElementById("status");
  const statusScr  = document.getElementById("status-screen");
  const toggleBtn  = document.getElementById("toggle-draw");
  const clearBtn   = document.getElementById("clear-draw");
  const modeEl     = document.getElementById("mode-indicator");
  const wrap       = document.getElementById("canvas-wrap");
  const camPill    = document.getElementById("nav-cam-pill");

  let landmarker   = null;
  let frameCount   = 0, fps = 0, fpsTimer = 0;
  let drawEnabled  = true;

  const smoothed   = { Left: null, Right: null };
  const lastDrawPt = { Left: null, Right: null };
  const wasPinch   = { Left: false, Right: false };

  const ALPHA        = 0.45;
  const PINCH_PX_THR = 0.075;
  const ERASER_R     = 40;
  const PEN_W        = 5;

  function lerpPt(prev, next, a) {
    if (!prev) return { ...next };
    return { x: prev.x + (next.x - prev.x) * a, y: prev.y + (next.y - prev.y) * a };
  }
  function ndist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  async function init() {
    statusEl.textContent = "กำลังโหลดโมเดล AI...";
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
    );
    landmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    // Mark model ready
    document.getElementById("nav-model-pill").classList.add("live");

    statusEl.textContent = "กำลังเปิดกล้อง...";
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        const W = video.videoWidth, H = video.videoHeight;
        camCanvas.width = drawCanvas.width = W;
        camCanvas.height = drawCanvas.height = H;
        wrap.style.aspectRatio = `${W} / ${H}`;
        camCanvas.style.transform = drawCanvas.style.transform = "scaleX(-1)";

        camPill.classList.add("live");
        camPill.querySelector("span:last-child").textContent = "Live";
        statusScr.style.display = "none";
        requestAnimationFrame(detect);
      };
    } catch (e) {
      statusEl.textContent = "❌ ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้อง";
      console.error(e);
    }
  }

  function gestureLabel(lm) {
    const tips  = FINGER_TIPS.map(i => lm[i]);
    const bases = FINGER_BASES.map(i => lm[i]);
    const thumbOpen = lm[4].x < lm[3].x;
    const ext = [1,2,3,4].map(i => tips[i].y < bases[i].y);
    const n = ext.filter(Boolean).length + (thumbOpen ? 1 : 0);
    if (!thumbOpen && ext.every(e=>!e)) return "✊ Fist";
    if (thumbOpen && ext.every(e=>e))   return "🖐 Open Hand";
    if (!thumbOpen && ext[0] && !ext[1] && !ext[2] && !ext[3]) return "☝️ Point";
    if (!thumbOpen && ext[0] &&  ext[1] && !ext[2] && !ext[3]) return "✌️ Peace";
    if (thumbOpen && !ext[0] && !ext[1] && !ext[2] && !ext[3]) return "👍 Thumbs Up";
    if (thumbOpen && !ext[0] && !ext[1] && !ext[2] &&  ext[3]) return "🤙 Call Me";
    return `🖐 ${n} Finger${n!==1?'s':''}`;
  }

  function drawSkeleton(lm, hand) {
    const W = camCanvas.width, H = camCanvas.height;
    const isL = hand === "Left";
    const col1 = isL ? "#00f5ff" : "#a855f7";
    const col2 = isL ? "#0057ff" : "#7c3aed";
    const tipC = isL ? "#ffffff" : "#e9d5ff";

    camCtx.lineCap = "round";
    CONNECTIONS.forEach(([a,b]) => {
      const ax=lm[a].x*W, ay=lm[a].y*H, bx=lm[b].x*W, by=lm[b].y*H;
      const g = camCtx.createLinearGradient(ax,ay,bx,by);
      g.addColorStop(0, col1+"cc"); g.addColorStop(1, col2+"cc");
      camCtx.beginPath();
      camCtx.strokeStyle = g; camCtx.lineWidth = 3;
      camCtx.shadowColor = col1; camCtx.shadowBlur = 10;
      camCtx.moveTo(ax,ay); camCtx.lineTo(bx,by); camCtx.stroke();
    });
    camCtx.shadowBlur = 0;

    lm.forEach((pt,i) => {
      const x=pt.x*W, y=pt.y*H;
      const isTip = FINGER_TIPS.includes(i);
      camCtx.beginPath();
      camCtx.arc(x, y, isTip?8:5, 0, Math.PI*2);
      camCtx.fillStyle = isTip ? tipC : col1;
      camCtx.shadowColor = col1; camCtx.shadowBlur = isTip?20:12;
      camCtx.fill(); camCtx.shadowBlur = 0;
      if (isTip) {
        camCtx.beginPath(); camCtx.arc(x,y,12,0,Math.PI*2);
        camCtx.strokeStyle = col1+"55"; camCtx.lineWidth=2; camCtx.stroke();
      }
    });
  }

  function drawCursor(x, y, isEraser, active) {
    camCtx.save();
    if (isEraser) {
      camCtx.beginPath(); camCtx.arc(x,y,ERASER_R,0,Math.PI*2);
      camCtx.strokeStyle = active ? "#f87171" : "rgba(248,113,113,0.45)";
      camCtx.lineWidth = active ? 3 : 1.5;
      camCtx.setLineDash([6,4]); camCtx.stroke(); camCtx.setLineDash([]);
    } else {
      const r = active ? PEN_W : 6;
      camCtx.beginPath(); camCtx.arc(x,y,r,0,Math.PI*2);
      camCtx.fillStyle = active ? "#ffffff" : "rgba(255,255,255,0.35)";
      camCtx.shadowColor = "#a855f7"; camCtx.shadowBlur = active?22:8;
      camCtx.fill(); camCtx.shadowBlur = 0;
      if (!active) {
        camCtx.strokeStyle = "rgba(255,255,255,0.25)"; camCtx.lineWidth = 1;
        camCtx.beginPath(); camCtx.moveTo(x-14,y); camCtx.lineTo(x+14,y); camCtx.stroke();
        camCtx.beginPath(); camCtx.moveTo(x,y-14); camCtx.lineTo(x,y+14); camCtx.stroke();
      }
    }
    camCtx.restore();
  }

  function detect(ts) {
    if (!landmarker || video.readyState < 2) { requestAnimationFrame(detect); return; }

    frameCount++;
    if (ts - fpsTimer > 1000) {
      fps = frameCount; frameCount = 0; fpsTimer = ts;
      fpsEl.textContent = `${fps} FPS`;
    }

    const res = landmarker.detectForVideo(video, ts);
    const W = camCanvas.width, H = camCanvas.height;

    camCtx.clearRect(0,0,W,H);
    camCtx.drawImage(video,0,0,W,H);
    camCtx.fillStyle = "rgba(0,0,0,0.22)";
    camCtx.fillRect(0,0,W,H);

    const hands = res.landmarks || [];
    handCountEl.textContent = `${hands.length} มือ`;

    const present = new Set();
    const labels  = [];

    hands.forEach((lm, i) => {
      const hand = res.handedness?.[i]?.[0]?.categoryName || "Right";
      present.add(hand);
      drawSkeleton(lm, hand);
      labels.push(gestureLabel(lm));

      if (!drawEnabled) return;

      const thumb = lm[4], index = lm[8];
      const pinching = ndist(thumb, index) < PINCH_PX_THR;
      const raw = { x: (thumb.x + index.x) / 2 * W, y: (thumb.y + index.y) / 2 * H };
      smoothed[hand] = lerpPt(smoothed[hand], raw, ALPHA);
      const sx = smoothed[hand].x, sy = smoothed[hand].y;

      drawCursor(sx, sy, hand === "Left", pinching);

      if (pinching) {
        if (hand === "Left") {
          drawCtx.save();
          drawCtx.globalCompositeOperation = "destination-out";
          drawCtx.beginPath(); drawCtx.arc(sx, sy, ERASER_R, 0, Math.PI*2);
          drawCtx.fill();
          drawCtx.restore();
        } else {
          if (wasPinch[hand] && lastDrawPt[hand]) {
            drawCtx.beginPath();
            drawCtx.moveTo(lastDrawPt[hand].x, lastDrawPt[hand].y);
            drawCtx.lineTo(sx, sy);
            drawCtx.strokeStyle = "#ffffff";
            drawCtx.lineWidth = PEN_W;
            drawCtx.lineCap = "round"; drawCtx.lineJoin = "round";
            drawCtx.shadowColor = "#a855f7"; drawCtx.shadowBlur = 14;
            drawCtx.stroke(); drawCtx.shadowBlur = 0;
          }
          lastDrawPt[hand] = { x: sx, y: sy };
        }
        wasPinch[hand] = true;
      } else {
        wasPinch[hand] = false;
        lastDrawPt[hand] = null;
      }
    });

    ["Left","Right"].forEach(h => {
      if (!present.has(h)) { smoothed[h] = null; wasPinch[h] = false; lastDrawPt[h] = null; }
    });

    gestureEl.textContent = labels.length ? labels.join("  ") : "ยกมือขึ้น";
    gestureEl.style.opacity = labels.length ? "1" : "0.35";

    requestAnimationFrame(detect);
  }

  toggleBtn.addEventListener("click", () => {
    drawEnabled = !drawEnabled;
    toggleBtn.querySelector(".btn-label").textContent = drawEnabled ? "วาด: เปิด" : "วาด: ปิด";
    toggleBtn.classList.toggle("off", !drawEnabled);
    toggleBtn.classList.toggle("primary", drawEnabled);
    modeEl.style.display = drawEnabled ? "flex" : "none";
  });

  clearBtn.addEventListener("click", () => {
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  });

  init();
</script>
</body>
</html>
